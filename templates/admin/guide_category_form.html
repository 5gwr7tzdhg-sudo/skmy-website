{% extends "base.html" %}

{% block content %}

<h1>{% if category %}Редактирование категории{% else %}Новая категория путеводителя{% endif %}</h1>

{% if errors %}
<ul>
    {% for error in errors %}
    <li>{{ error }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p>
        <label for="language">Язык *</label><br>
        <input id="language" name="language" value="{{ form_data.get('language', '') }}" required>
    </p>

    <p>
        <label for="slug">Slug *</label><br>
        <input id="slug" name="slug" value="{{ form_data.get('slug', '') }}" required>
    </p>

    <p>
        <label for="title">Название *</label><br>
        <input id="title" name="title" value="{{ form_data.get('title', '') }}" required>
    </p>

    <p>
        <label for="description">Описание</label><br>
        <textarea id="description" name="description" rows="4">{{ form_data.get('description', '') }}</textarea>
    </p>

    <p>
        <label for="icon">Иконка</label><br>
        <input id="icon" name="icon" value="{{ form_data.get('icon', '') }}">
    </p>

    <p>
        <label for="sort_order">Порядок сортировки</label><br>
        <input id="sort_order" name="sort_order" type="number" value="{{ form_data.get('sort_order', '') }}">
    </p>

    <p>
        <label>
            <input name="is_active" type="checkbox" {% if form_data.get('is_active') is not none %}checked{% endif %}>
            Активна
        </label>
    </p>

    <button type="submit">{% if category %}Сохранить изменения{% else %}Сохранить категорию{% endif %}</button>
</form>

<p><a href="{{ url_for('admin_guide.categories') }}">← К списку категорий</a></p>

{% endblock %}
