<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель SKMY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-body">
    <main class="admin-login">
        <section class="admin-login__card">
            <span class="admin-brand__mark">SKMY</span>
            <p class="admin-topbar__eyebrow">Админ-панель</p>
            <h1>Вход</h1>
            <p>Войдите, чтобы управлять материалами сайта.</p>
            {% if error %}<div class="admin-alert">{{ error }}</div>{% endif %}
            <form class="admin-form" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="admin-field"><label for="email">Email</label><input id="email" name="email" type="email" required autofocus></div>
                <div class="admin-field"><label for="password">Пароль</label><input id="password" name="password" type="password" required></div>
                <button class="admin-button" type="submit">Войти</button>
            </form>
            <a class="admin-back-link" href="/ru/">Вернуться на сайт</a>
        </section>
    </main>
</body>
</html>
