<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta_title|default('SKMY — поддержка глухих иммигрантов в Финляндии') }}</title>
    <meta name="description" content="{{ meta_description|default('SKMY помогает глухим иммигрантам ориентироваться в Финляндии: услуги, права и практические инструкции.') }}">
    <meta property="og:title" content="{{ meta_title|default('SKMY — поддержка глухих иммигрантов в Финляндии') }}">
    <meta property="og:description" content="{{ meta_description|default('SKMY помогает глухим иммигрантам ориентироваться в Финляндии: услуги, права и практические инструкции.') }}">
    <link rel="canonical" href="{{ base_url }}{{ request.path }}">
    {% if not request.path.startswith('/admin') %}
    <link rel="alternate" hreflang="fi" href="{{ base_url }}{{ request.path.replace('/' ~ lang, '/fi', 1) }}">
    <link rel="alternate" hreflang="ru" href="{{ base_url }}{{ request.path.replace('/' ~ lang, '/ru', 1) }}">
    <link rel="alternate" hreflang="en" href="{{ base_url }}{{ request.path.replace('/' ~ lang, '/en', 1) }}">
    {% endif %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <a href="/{{ lang }}/">SKMY</a>
    </div>

    <nav class="main-nav">
        <a href="/{{ lang }}/">Главная</a>
        <a href="/{{ lang }}/about">О нас</a>
        <a href="/{{ lang }}/news">Новости</a>
        <a href="/{{ lang }}/guide">Путеводитель</a>
        <a href="/{{ lang }}/interpreting">Сурдоперевод</a>
        <a href="/{{ lang }}/contacts">Контакты</a>
    </nav>

    <nav class="lang-nav">
        <a href="/fi/">FI</a>
        <a href="/ru/">RU</a>
        <a href="/en/">EN</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    © SKMY
</footer>

</body>
</html>
