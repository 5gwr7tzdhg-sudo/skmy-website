{% extends "base.html" %}
{% block content %}
<div class="public-page-heading reveal"><p class="home-eyebrow">YHTEYS SKMY:HYN</p><h1>Yhteystiedot</h1><p>Kirjoita meille, jos tarvitset tietoa tai tukea.</p></div>
{% if success_message %}<p class="home-empty">{{ success_message }}</p>{% endif %}{% if errors %}<ul>{% for error in errors %}<li>{{ error }}</li>{% endfor %}</ul>{% endif %}
<form class="reveal" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="language" value="{{ lang }}"><p><label for="name">Nimi *</label><input id="name" name="name" value="{{ form_data.get('name', '') }}" required></p><p><label for="email">Sähköposti *</label><input id="email" name="email" type="email" value="{{ form_data.get('email', '') }}" required></p><p><label for="subject">Aihe *</label><input id="subject" name="subject" value="{{ form_data.get('subject', '') }}" required></p><p><label for="message">Viesti *</label><textarea id="message" name="message" rows="8" required>{{ form_data.get('message', '') }}</textarea></p><button type="submit">Lähetä</button></form>
{% endblock %}
