{% extends "base.html" %}

{% block content %}

<h1>Поиск по путеводителю</h1>

<form method="get" action="{{ url_for('search.search', lang=lang) }}">
    <label for="search-query">Поисковый запрос</label><br>
    <input id="search-query" name="q" type="search" value="{{ query }}">
    <button type="submit">Найти</button>
</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}

{% if articles %}
<div class="article-list">
    {% for article in articles %}
    <article class="article-card">
        <h2>
            <a href="/{{ lang }}/guide/{{ article.category.slug }}/{{ article.slug }}">
                {{ article.title }}
            </a>
        </h2>
        <p><strong>Категория:</strong> {{ article.category.title }}</p>
        <p>{{ article.summary }}</p>
    </article>
    {% endfor %}
</div>
{% endif %}

{% endblock %}
